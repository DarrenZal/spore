  version: 1
  status: active
authority_mode: unilateral
authored_by:
  - holon: nation.alpha.boundary-steward
    role: draft_author
ratified_by:
  - holon: nation.alpha.stewardship-council
    scope: bounded_external_assessment_use
purpose:
  - boundary_review
  - limited_comparison
allowed_operations:
  - compare
  - summarize_for_boundary_review
disallowed_operations:
