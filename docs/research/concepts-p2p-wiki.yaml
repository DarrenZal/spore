# status: frozen
# version: v4
# frozen_at: 2026-04-22
# owner: Darren Zal
# purpose: Canonical concept vocabulary governing ADR `concepts:` references, shared framing notes, and bridge-note R-claim `concept:` values across Spore / Intelligence Commons / Poietic Match.
# Agents reading this file MUST NOT mint concept slugs outside this vocabulary during
# Tier 1b/2/3 of the wiki-intake plan. Pass 2 fan-out (Phase B) gate:
# `head -1 concepts-p2p-wiki.yaml` must match "# status: frozen" before fan-out.
# Extensions to this vocab require a separate commit with operator approval and
# a version bump — do NOT silently append.
# v2 (2026-04-17): adds 18 slugs from Phase A synthesis §7a covering reproductive
# commoning, pluriversal/care/solidarity vocabularies, autopoiesis/4E, cosmo-local,
# platform-cooperativism, REA/ValueFlows, commons-law, and 2 opposition primitives
# (filtering-membrane, decentralization-theater). polycentric-governance definition
# expanded with 4-level ladder per §7b absorption.
# v3 (2026-04-22): adds 2 slugs (governance-memory, adoption-surface) to unblock the
# canon-review Round 1 work downstream of spore-canon-adversarial-critique
# (2026-04-22). Extension operator-authorized under the foundation-repair-flexibility
# directive (memory: feedback_foundation_repair_protocol_flexibility.md).
# v4 (2026-04-22): adds 4 slugs (operational-rule, collective-choice-rule,
# constitutional-rule, rule-in-use) for ADR-0046 field-rule-level-stratification
# (Phase 3b.2 Option B — Ostrom 3-level action-situation stack + rule-in-use vs
# rule-in-form distinction imported into Field primitive internal structure). The
# 7-rule-type taxonomy (boundary / position / choice / aggregation / information /
# payoff / scope) is handled prose-only in canon body; slugification decision
# operator-deferred. Extension operator-authorized under canon-rebuild-phase-3b-2.

concepts:
  - slug: governance-memory
    canonical_label: Governance Memory
    aliases: [governance-memory-pattern]
    one_line_definition: The pattern whereby constitutional artifacts declare machine-readable dependencies, lifecycle state, and provenance via frontmatter so that governance relationships are queryable across a spec DAG — a convention applied to docs, not an architectural layer.
    primary_project: spore

  - slug: adoption-surface
    canonical_label: Adoption Surface
    aliases: [coordination-surface, adoption-pathway]
    one_line_definition: An independently useful coordination affordance (frontmatter, sensor node, edge permissions, profile declarations) that a project may compose into its practice without restructuring existing work; surfaces are additive and independent, adopted according to the project's coordination goals rather than in a required sequence.
    primary_project: spore

  - slug: boundary-commoning
    canonical_label: Boundary Commoning
    aliases: [boundary-commons, commoning-at-boundaries]
    one_line_definition: Coordination at the edges between distinct commons systems, involving shared rule-making at the boundary without full merger of the underlying commons.
    primary_project: spore

  - slug: polycentric-governance
    canonical_label: Polycentric Governance
    aliases: [polycentrism, multi-center-governance]
    one_line_definition: Governance distributed across multiple decision centers that interact formally, each with limited autonomy; sits on a 4-level ladder (centralized → decentralized → polycentric → bioregional) where bioregional is the stricter form matching political-administrative boundaries to ecological ones.
    primary_project: spore

  - slug: commitment-pooling
    canonical_label: Commitment Pooling
    aliases: [pooled-commitments, commitment-pools]
    one_line_definition: Aggregation of commitments across parties into a shared pool whose resolution/allocation follows pool-level rules rather than per-party transactions.
    primary_project: pm

  - slug: mutual-credit
    canonical_label: Mutual Credit
    aliases: [mutual-credit-system, peer-credit]
    one_line_definition: A credit system in which participants extend credit directly to each other, typically without a central issuer or interest, with net positions tracked relative to a shared unit.
    primary_project: pm

  - slug: knowledge-commons
    canonical_label: Knowledge Commons
    aliases: [knowledge-as-commons, commons-based-knowledge]
    one_line_definition: Knowledge as a commons with shared governance over creation, curation, access, and use — as distinct from both private property and public-goods framings.
    primary_project: ic

  - slug: inclusive-governance
    canonical_label: Inclusive Governance
    aliases: [inclusive-participation, multi-stakeholder-governance]
    one_line_definition: Governance arrangements that structurally include affected parties (beneficiaries, contributors, bystanders) in decision-making beyond consultation.
    primary_project: ic

  - slug: generative-value
    canonical_label: Generative Value
    aliases: [generativity, generative-commons]
    one_line_definition: Value that is produced-through-use rather than consumed-by-use; commons and knowledge goods typically have this property.
    primary_project: ic

  - slug: protocol-society
    canonical_label: Protocol Society
    aliases: [protocolization, protocol-governance]
    one_line_definition: A societal arrangement in which coordination runs primarily through agreed-upon protocols (vs. hierarchies or markets alone); governance becomes protocol design.
    primary_project: spore

  - slug: curation-valuation-limitation-exchange
    canonical_label: Curation / Valuation / Limitation / Exchange (CVLE)
    aliases: [cvle, four-functions-of-commons]
    one_line_definition: Four coordination functions identified across commons-design literatures — curating membership and content, valuing contributions, limiting extraction, enabling exchange.
    primary_project: pm

  - slug: market-dependence
    canonical_label: Market Dependence
    aliases: [market-reliance, marketization]
    one_line_definition: The condition in which actors must engage with markets to meet needs, regardless of whether they would choose to; distinguished from mere market use.
    primary_project: pm

  - slug: value-capture
    canonical_label: Value Capture
    aliases: [value-extraction]
    one_line_definition: Concentration of value produced by a commons or collective activity into private hands via enclosure, IP, platform rent, or structural extraction.
    primary_project: ic

  - slug: power-capture
    canonical_label: Power Capture
    aliases: [governance-capture, regulatory-capture]
    one_line_definition: Structural accrual of governance power to a subset of participants, often via mechanisms designed for other ends (protocol lock-in, gatekeeper roles, data asymmetry).
    primary_project: spore

  - slug: interoperability-as-institutional
    canonical_label: Interoperability as Institutional
    aliases: [institutional-interoperability, interop-as-governance]
    one_line_definition: The view that interoperability between systems is an institutional/governance problem as much as a technical one — schemas, protocols, and trust frames all matter.
    primary_project: ic

  - slug: boundary-spanner
    canonical_label: Boundary Spanner
    aliases: [boundary-role, liaison]
    one_line_definition: An agent or role whose function is to mediate between two or more otherwise-separate systems, translating across boundary conditions.
    primary_project: spore

  - slug: coordination-substrate
    canonical_label: Coordination Substrate
    aliases: [substrate-for-coordination, coordination-layer]
    one_line_definition: The shared infrastructure (technical, linguistic, normative) that enables a set of actors to coordinate without bilateral negotiation for every act.
    primary_project: pm

  - slug: commercial-credit-circuit
    canonical_label: Commercial Credit Circuit
    aliases: [ccc, trade-credit-circuit]
    one_line_definition: A closed circuit of commercial actors extending credit to each other via shared instruments, clearing net positions periodically rather than transacting in cash.
    primary_project: pm

  - slug: bioregional-coordination
    canonical_label: Bioregional Coordination
    aliases: [bioregional-governance, watershed-coordination]
    one_line_definition: Coordination scoped to ecological boundaries (watersheds, bioregions) rather than political jurisdictions; typical basis for regenerative governance proposals.
    primary_project: pm

  - slug: reputation-market
    canonical_label: Reputation Market
    aliases: [reputation-economy, trust-market]
    one_line_definition: A coordination mechanism in which reputation (not cash) is the primary exchanged quantity for access, influence, or rights within a community.
    primary_project: pm

  - slug: collective-agency
    canonical_label: Collective Agency
    aliases: [group-agency, collective-intentionality]
    one_line_definition: The capacity of a group to act as an agent — holding intentions, deliberating, and being held responsible — beyond the sum of individual agencies.
    primary_project: spore

  - slug: memory-governance
    canonical_label: Memory Governance
    aliases: [knowledge-memory-governance, archive-governance]
    one_line_definition: Governance of what is remembered, forgotten, attributed, and accessible across time for a commons or knowledge infrastructure.
    primary_project: ic

  # ─── v2 additions (2026-04-17) — Phase A synthesis §7a ────────────────────

  - slug: reproductive-commoning
    canonical_label: Reproductive Commoning
    aliases: [reproductive-labor-commons]
    one_line_definition: Commoning centered on reproductive labor — care, provisioning, housing, territorial stewardship — as the primary (not derivative) coordination substrate; Federici/Bhattacharya lineage via `Communalization_of_Housework`, `Women_and_the_Commons`, `Caring_Economy`, `Social_Reproduction_Theory`.
    primary_project: spore

  - slug: care-commoning
    canonical_label: Care Commoning
    aliases: [care-as-coordinating-practice, asymmetric-care-relation]
    one_line_definition: Care as load-bearing cross-cutting doctrine — Held's three senses (labor + disposition + relational practice), Tronto's four-phase process (attentiveness → responsibility → competence → responsiveness, plus caring-with), Kittay's nested-dependency, Federici's invisibilisation critique. Sibling cross-cutting doctrine to `reproductive-commoning` (ADR-0002) and `boundary-commoning` (ADR-0003); applies as lens across commitment / intent / evidence / field / holon / membrane primitives without primitive-elevation. Promoted from `reproductive-commoning` alias to first-class slug per ADR-0045.
    primary_project: spore

  - slug: pluriversal-commoning
    canonical_label: Pluriversal Commoning
    aliases: [pluriverse, ontological-pluralism]
    one_line_definition: Commoning framed by Escobar/Gudynas/Acosta as refusal of One-World doctrine — a world of many worlds where knowledge systems are ontologically distinct and translation is political negotiation rather than technical standardization.
    primary_project: ic

  - slug: gift-obligation
    canonical_label: Gift Obligation
    aliases: [mauss-gift, ongoing-obligation]
    one_line_definition: Mauss/Pinchot gift-economy dynamic where attribution encodes ongoing obligation (not just recognition) — status accrues via contribution, and gifts create unbounded reciprocity relations rather than closing transactions.
    primary_project: ic

  - slug: solidarity-substrate
    canonical_label: Solidarity Substrate
    aliases: [solidarity-economy, mutual-aid-substrate]
    one_line_definition: Coordination substrate grounded in solidarity (reciprocity as design principle, not value-statement) — Pat Conaty/Michael Lewis framing of social solidarity economy, CSA/mutual-aid/tontine lineages, distinct from both market and state substrates.
    primary_project: pm

  - slug: commons-as-verb
    canonical_label: Commons as Verb (Commoning)
    aliases: [commoning-practice, commoning-activity]
    one_line_definition: Bresnihan/De Angelis framing: commons is constituted through the activity of commoning (acting and doing in common across human and non-human actors), not as a noun/resource. Primary coordinating practice is care, not governance.
    primary_project: spore

  - slug: autopoiesis
    canonical_label: Autopoiesis
    aliases: [autopoietic-system, self-production]
    one_line_definition: Maturana-Varela (1972) theory of living systems as organizationally closed networks that continuously produce and regenerate their own components while remaining structurally coupled to their environment.
    primary_project: ic

  - slug: structural-coupling
    canonical_label: Structural Coupling
    aliases: [perturbation-coupling, coupling-dynamics]
    one_line_definition: Autopoiesis-theoretic relation where a system and its environment co-specify each other through recurrent perturbation without exchanging components — distinguishes informational openness from operational closure.
    primary_project: ic

  - slug: enactive-cognition
    canonical_label: Enactive Cognition
    aliases: [4e-cognition, embodied-cognition]
    one_line_definition: Varela-Thompson-Rosch (1991) and 4E (embodied/embedded/enacted/extended) framing of cognition as enaction — sense-making emerges at the interaction level through sensorimotor coupling, not from internal representations.
    primary_project: ic

  - slug: cosmo-local-production
    canonical_label: Cosmo-Local Production
    aliases: [design-global-manufacture-local, dgml]
    one_line_definition: Ramos/Bauwens/Kostakis framing where knowledge/design is globally shared as commons while production is distributed locally per subsidiarity — federated realization of global design commons at the lowest competent scale.
    primary_project: spore

  - slug: open-hardware-commons
    canonical_label: Open Hardware Commons
    aliases: [fab-lab-commons, open-source-hardware]
    one_line_definition: Gershenfeld/Fab-Lab lineage of commons-governed physical-infrastructure production; 4 degrees of openness (closed → interface-open → design-open → implementation-open); Fab Charter encodes right-to-join/leave, transparency, education.
    primary_project: spore

  - slug: platform-cooperativism
    canonical_label: Platform Cooperativism
    aliases: [platform-coop, cooperative-platform]
    one_line_definition: Scholz (2016) framing of democratically-owned/governed digital platforms as constructive alternative to investor-driven extractive platforms; multi-stakeholder cooperative ownership replaces shareholder model.
    primary_project: pm

  - slug: open-cooperativism
    canonical_label: Open Cooperativism
    aliases: [commons-based-cooperativism, bauwens-open-coop]
    one_line_definition: Conaty-Bollier convergence thesis: commons-based peer production + cooperative ownership = "cooperative accumulation"; Bauwens' 4 criteria (commons-good, multi-stakeholder, commons co-production, glocal organizational structure).
    primary_project: pm

  - slug: stigmergy
    canonical_label: Stigmergy
    aliases: [environmental-trace-coordination, indirect-coordination]
    one_line_definition: Heylighen (2015) formalization of indirect coordination via persistent environmental traces — no central authority, planning, or temporal simultaneity required; coordination emerges from agents responding to traces in a shared medium.
    primary_project: ic

  - slug: rea-ontology
    canonical_label: REA Ontology / ValueFlows
    aliases: [resource-event-agent, valueflows-vocabulary, nrp-rea]
    one_line_definition: Resource-Event-Agent ontology (McCarthy 1982) extended by Lynn Foster/Bob Haugen via NRP → ValueFlows → Holo-REA into a bidirectional resource-flow vocabulary with 6 principles (internetworking, bidirectional tracking, reward distribution, fractality, recipe/planning/accounting, shape-agnostic) excluding price-based valuation.
    primary_project: pm

  - slug: commons-law
    canonical_label: Commons Law
    aliases: [commons-chartering, constitutional-commons, commons-trusts]
    one_line_definition: 800-year legal-institutional lineage of commons-access rights — Charter of the Forest (1217) codifying subsistence-commons access distinct from Magna Carta's political-liberties lineage, extending through modern commons trusts and public-commons partnerships; law as scaffolding for commons governance, absent which governance-alone invites enclosure via regulation.
    primary_project: spore

  - slug: bioregional-scope
    canonical_label: Bioregional Scope
    aliases: [watershed-scope, bioregional-governance-scope]
    one_line_definition: 4th-level scope on the governance ladder (centralized → decentralized → polycentric → bioregional), matching political-administrative boundaries to ecological ones (watersheds, biogeographic regions); stricter than polycentric — no organization higher than necessary, and no 501(c)(3) can legitimately represent a bioregion.
    primary_project: pm

  - slug: filtering-membrane
    canonical_label: Filtering Membrane (De Angelis; refuted by FairCoin study)
    aliases: [de-angelis-membrane, commons-filter]
    one_line_definition: De Angelis's cell-biology-inspired framing of commons boundaries as "filtering membranes" that selectively admit/reject external value flows; empirically refuted by the Dallyn-Frenzel (2021, Antipode) FairCoin failure study, which shows unspecified boundaries, convertibility pressure, and external-market valuation dependence collapse the filter. Opposition primitive.
    primary_project: spore

  - slug: decentralization-theater
    canonical_label: Decentralization Theater
    aliases: [fake-decentralization, nominal-decentralization]
    one_line_definition: Yarvin framing (and Brastaviceanu extensions) for systems that display the appearance of decentralization — nominal P2P topology, blockchain branding — while retaining centralized power concentrations via admin keys, protocol governance, or operational dependencies; an opposition primitive against unqualified "decentralized" / "peer-to-peer" claims.
    primary_project: spore

  - slug: operational-rule
    canonical_label: Operational Rule
    aliases: [operational-level-rule, day-to-day-rule]
    one_line_definition: First level in Ostrom's 3-level action-situation stack (operational / collective-choice / constitutional); governs day-to-day coordination within a field — how intents are surfaced, commitments entered, evidence recorded, signals routed. Sibling to collective-choice-rule and constitutional-rule per ADR-0046.
    primary_project: spore

  - slug: collective-choice-rule
    canonical_label: Collective-Choice Rule
    aliases: [rule-amendment-rule, meta-operational-rule]
    one_line_definition: Second level in Ostrom's 3-level action-situation stack; governs how operational rules are made, modified, and enforced — who has authority to set, amend, or invoke operational rules in a field. The level at which protocol-version amendment typically lives. Sibling to operational-rule and constitutional-rule per ADR-0046.
    primary_project: spore

  - slug: constitutional-rule
    canonical_label: Constitutional Rule
    aliases: [participation-eligibility-rule, foundation-document-rule]
    one_line_definition: Third level in Ostrom's 3-level action-situation stack; governs who is eligible to participate at the collective-choice level — the amendment-threshold layer. Corresponds to PEP 13 / Debian Foundation Documents / W3C Process Document scope in the governance-process tradition. Sibling to operational-rule and collective-choice-rule per ADR-0046.
    primary_project: spore

  - slug: rule-in-use
    canonical_label: Rule-in-Use
    aliases: [working-rule, observed-rule]
    one_line_definition: The rules participants would reference if asked to explain and justify their actions (McGinnis 2011 calls this "the pivotal methodological commitment of the Bloomington School"); distinct from rule-in-form (formal written rules). Compliance is assessed against rules-in-use; formal rules that are not working rules have no causal standing. Extends ADR-0041's text-authoritative-with-graph-as-derived-projection discipline to the rule layer. Per ADR-0046.
    primary_project: spore
